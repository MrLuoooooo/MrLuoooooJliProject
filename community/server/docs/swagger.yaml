basePath: /api/v1
definitions:
  handler.BroadcastRequest:
    properties:
      content:
        maxLength: 2000
        type: string
    required:
    - content
    type: object
  model.AddPostTagsRequest:
    properties:
      tag_ids:
        items:
          type: integer
        type: array
    required:
    - tag_ids
    type: object
  model.CreateCategoryRequest:
    properties:
      description:
        maxLength: 200
        type: string
      name:
        maxLength: 50
        type: string
      sort_order:
        type: integer
    required:
    - name
    type: object
  model.CreateCommentRequest:
    properties:
      content:
        type: string
      parent_id:
        type: integer
      post_id:
        type: integer
    required:
    - content
    - post_id
    type: object
  model.CreatePostRequest:
    properties:
      category_id:
        type: integer
      content:
        type: string
      cover_image:
        maxLength: 255
        type: string
      status:
        type: integer
      summary:
        maxLength: 500
        type: string
      title:
        maxLength: 200
        type: string
    required:
    - content
    - title
    type: object
  model.CreateTagRequest:
    properties:
      description:
        maxLength: 200
        type: string
      name:
        maxLength: 50
        type: string
    required:
    - name
    type: object
  model.FollowRequest:
    properties:
      follow_id:
        type: integer
    required:
    - follow_id
    type: object
  model.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  model.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  model.RegisterRequest:
    properties:
      email:
        type: string
      nickname:
        maxLength: 50
        type: string
      password:
        maxLength: 50
        minLength: 6
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  model.ResetPasswordRequest:
    properties:
      new_password:
        maxLength: 20
        minLength: 6
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  model.SendMessageRequest:
    properties:
      content:
        maxLength: 1000
        type: string
      receiver_id:
        type: integer
    required:
    - content
    - receiver_id
    type: object
  model.UpdateCategoryRequest:
    properties:
      description:
        maxLength: 200
        type: string
      name:
        maxLength: 50
        type: string
      sort_order:
        type: integer
      status:
        type: integer
    type: object
  model.UpdateCommentRequest:
    properties:
      content:
        type: string
    required:
    - content
    type: object
  model.UpdatePostRequest:
    properties:
      category_id:
        type: integer
      content:
        type: string
      cover_image:
        maxLength: 255
        type: string
      status:
        type: integer
      summary:
        maxLength: 500
        type: string
      title:
        maxLength: 200
        type: string
    type: object
  model.UpdateTagRequest:
    properties:
      description:
        maxLength: 200
        type: string
      name:
        maxLength: 50
        type: string
    type: object
  model.UpdateUserAdminTypeRequest:
    properties:
      admin_type:
        enum:
        - 0
        - 1
        type: integer
    required:
    - admin_type
    type: object
  model.UpdateUserStatusRequest:
    properties:
      status:
        enum:
        - 0
        - 1
        type: integer
    required:
    - status
    type: object
  response.Response:
    properties:
      code:
        type: integer
      data: {}
      msg:
        type: string
    type: object
